<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Комиссия по предварительной экспертизе — ООО «Эвоген»</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{
  --bg:#f6f4fc;
  --bg2:#efeafb;
  --card:#ffffff;
  --card-soft:#faf8ff;
  --ink:#1d1b2e;
  --ink-soft:#5b5772;
  --ink-faint:#8b87a3;
  --lav:#7c6cf0;
  --lav-soft:#a99bf6;
  --lav-tint:#ece8fd;
  --lav-tint2:#f4f1fe;
  --line:#e7e2f5;
  --line-soft:#f0edfa;
  --green:#34c07a;
  --green-tint:#e5f7ee;
  --amber:#e0a63c;
  --amber-tint:#fbf3e2;
  --red:#e5688a;
  --shadow:0 1px 2px rgba(60,50,120,.04),0 8px 30px rgba(90,70,180,.07);
  --shadow-lg:0 2px 6px rgba(60,50,120,.06),0 20px 60px rgba(90,70,180,.13);
  --r:18px;
  --r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(1200px 700px at 85% -5%, #eee9fd 0%, transparent 55%),
    radial-gradient(900px 600px at -10% 110%, #efeafb 0%, transparent 55%),
    var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  min-height:100%;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
h1,h2,h3{letter-spacing:-.02em;font-weight:600}
.hidden{display:none!important}

/* ---------- Login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{
  width:100%;max-width:420px;background:var(--card);border-radius:26px;
  box-shadow:var(--shadow-lg);padding:40px 36px;border:1px solid var(--line-soft);
}
.brand-mark{
  width:56px;height:56px;border-radius:16px;margin:0 auto 20px;
  background:linear-gradient(145deg,var(--lav),var(--lav-soft));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(124,108,240,.32);
}
.brand-mark svg{width:30px;height:30px}
.login-card h1{font-size:21px;text-align:center;line-height:1.3}
.login-card .sub{text-align:center;color:var(--ink-faint);font-size:13px;margin-top:6px;margin-bottom:26px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;padding-left:2px}
.field input{
  width:100%;padding:13px 15px;border-radius:var(--r-sm);border:1px solid var(--line);
  background:var(--card-soft);transition:.18s;outline:none;
}
.field input:focus{border-color:var(--lav-soft);background:#fff;box-shadow:0 0 0 4px var(--lav-tint)}
.btn{
  width:100%;padding:13px;border-radius:var(--r-sm);font-size:15px;font-weight:600;
  background:linear-gradient(145deg,var(--lav),#6a58e8);color:#fff;transition:.18s;
  box-shadow:0 6px 16px rgba(124,108,240,.28);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(124,108,240,.34)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:var(--lav-tint);color:var(--lav);box-shadow:none}
.btn.ghost:hover{background:var(--lav-tint2);transform:none;box-shadow:none}
.btn.slim{width:auto;padding:9px 16px;font-size:13.5px}
.btn.tiny{width:auto;padding:7px 13px;font-size:12.5px;border-radius:9px}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}
.demo-hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.7}
.demo-hint b{color:var(--ink-soft);font-weight:600}
.demo-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
.chip{background:var(--lav-tint2);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:11px;color:var(--ink-soft);cursor:pointer;transition:.15s}
.chip:hover{background:var(--lav-tint);color:var(--lav)}

/* ---------- App shell ---------- */
.app{display:none;min-height:100vh;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;background:rgba(255,255,255,.72);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--line-soft);
}
.topbar-inner{max-width:1160px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:14px}
.tb-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--lav),var(--lav-soft));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-mark svg{width:19px;height:19px}
.tb-title{font-size:14.5px;font-weight:600;line-height:1.25}
.tb-title small{display:block;font-size:11.5px;color:var(--ink-faint);font-weight:400}
.tb-spacer{flex:1}
.tb-user{display:flex;align-items:center;gap:10px}
.tb-user .who{text-align:right;line-height:1.2}
.tb-user .who .name{font-size:13.5px;font-weight:600}
.tb-user .who .role{font-size:11.5px;color:var(--lav);font-weight:500}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--lav-tint);color:var(--lav);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
.main{max-width:1160px;margin:0 auto;padding:28px 24px 80px;width:100%}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:4px;background:var(--lav-tint2);padding:4px;border-radius:12px;margin-bottom:26px;width:fit-content;border:1px solid var(--line-soft)}
.tab{padding:9px 18px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--ink-soft);transition:.15s}
.tab.active{background:#fff;color:var(--lav);box-shadow:var(--shadow)}
.tab:not(.active):hover{color:var(--ink)}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-head h2{font-size:24px}
.page-head .lead{color:var(--ink-faint);font-size:13.5px;margin-top:4px}

/* ---------- Cards ---------- */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--line-soft);box-shadow:var(--shadow);padding:22px}
.card+.card{margin-top:16px}
.grid{display:grid;gap:16px}

/* Material list */
.mat-list{display:grid;gap:14px}
.mat{background:var(--card);border-radius:var(--r);border:1px solid var(--line-soft);box-shadow:var(--shadow);padding:18px 20px;display:flex;align-items:center;gap:16px;transition:.18s}
.mat:hover{box-shadow:var(--shadow-lg);border-color:var(--line)}
.mat-ico{width:44px;height:44px;border-radius:12px;background:var(--lav-tint);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mat-ico svg{width:22px;height:22px;color:var(--lav)}
.mat-body{flex:1;min-width:0}
.mat-title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mat-meta{font-size:12.5px;color:var(--ink-faint);margin-top:3px}
.mat-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

.status-pill{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap}
.st-open{background:var(--amber-tint);color:var(--amber)}
.st-done{background:var(--green-tint);color:var(--green)}
.st-wait{background:var(--lav-tint);color:var(--lav)}

.progress-mini{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft)}
.pdots{display:flex;gap:3px}
.pdot{width:8px;height:8px;border-radius:50%;background:var(--line)}
.pdot.on{background:var(--lav)}

/* Empty */
.empty{text-align:center;padding:56px 24px;color:var(--ink-faint)}
.empty svg{width:52px;height:52px;opacity:.4;margin-bottom:14px}
.empty p{font-size:14px}

/* Upload */
.drop{
  border:2px dashed var(--lav-soft);border-radius:var(--r);padding:36px 24px;text-align:center;
  background:var(--lav-tint2);transition:.18s;cursor:pointer;
}
.drop:hover,.drop.over{background:var(--lav-tint);border-color:var(--lav)}
.drop svg{width:40px;height:40px;color:var(--lav);margin-bottom:12px}
.drop h3{font-size:15px}
.drop p{font-size:12.5px;color:var(--ink-faint);margin-top:5px}

/* ---------- Ballot ---------- */
.modal-back{position:fixed;inset:0;background:rgba(40,32,80,.32);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:var(--card);border-radius:24px;box-shadow:var(--shadow-lg);width:100%;max-width:680px;overflow:hidden;animation:pop .22s cubic-bezier(.2,.8,.2,1)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:22px 26px;border-bottom:1px solid var(--line-soft);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.modal-head h2{font-size:18px}
.modal-head .msub{font-size:12.5px;color:var(--ink-faint);margin-top:3px}
.x{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);transition:.15s;flex-shrink:0}
.x:hover{background:var(--lav-tint2);color:var(--ink)}
.modal-body{padding:24px 26px;max-height:none}
.ballot-field{margin-bottom:18px}
.ballot-field .lbl{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:5px}
.ballot-field .val{font-size:15px;font-weight:500}

.vote-title{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:12px}
.vote-opts{display:grid;gap:10px}
.vote-opt{
  border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;display:flex;gap:13px;align-items:flex-start;
  cursor:pointer;transition:.16s;background:var(--card-soft);
}
.vote-opt:hover{border-color:var(--lav-soft);background:var(--lav-tint2)}
.vote-opt.sel{border-color:var(--lav);background:var(--lav-tint);box-shadow:0 0 0 3px var(--lav-tint2)}
.vo-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;position:relative;transition:.16s}
.vote-opt.sel .vo-radio{border-color:var(--lav)}
.vote-opt.sel .vo-radio::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--lav)}
.vo-text .vo-main{font-size:14.5px;font-weight:600;line-height:1.35}
.vo-text .vo-hint{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
.ballot-comment{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card-soft);resize:vertical;min-height:70px;outline:none;transition:.16s}
.ballot-comment:focus{border-color:var(--lav-soft);background:#fff;box-shadow:0 0 0 4px var(--lav-tint)}
.modal-foot{padding:18px 26px;border-top:1px solid var(--line-soft);display:flex;gap:10px;justify-content:flex-end;align-items:center;background:var(--card-soft)}
.modal-foot .fnote{font-size:12px;color:var(--ink-faint);margin-right:auto}

/* Preview */
.doc-bar{display:flex;align-items:center;gap:14px;background:var(--lav-tint2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:20px}
.doc-bar-ico{width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow)}
.doc-bar-ico svg{width:22px;height:22px;color:var(--lav)}
.doc-bar-body{flex:1;min-width:0}
.doc-bar-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-bar-meta{font-size:12px;color:var(--ink-faint);margin-top:2px}
.doc-bar-actions{display:flex;gap:8px;flex-shrink:0}
.preview{background:var(--card-soft);border:1px solid var(--line-soft);border-radius:12px;padding:18px 20px;max-height:320px;overflow-y:auto;font-size:14px;line-height:1.65}
.preview h1{font-size:18px;margin:6px 0 10px}
.preview h2{font-size:15px;margin:16px 0 6px}
.preview p{margin:8px 0;color:var(--ink-soft)}

/* ---------- Results / tally ---------- */
.tally-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px}
@media(max-width:640px){.tally-grid{grid-template-columns:1fr}}
.tally-card{background:var(--card-soft);border:1px solid var(--line-soft);border-radius:var(--r);padding:18px;text-align:center}
.tally-card .tnum{font-size:34px;font-weight:700;color:var(--lav);letter-spacing:-.03em}
.tally-card .tlbl{font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:1.4;min-height:32px}
.tally-card.win{background:var(--lav-tint);border-color:var(--lav-soft)}
.bar{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin-top:12px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--lav),var(--lav-soft));border-radius:5px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

.decision-banner{margin-top:20px;padding:18px 20px;border-radius:var(--r);display:flex;gap:14px;align-items:center;background:var(--green-tint);border:1px solid #bfe9d3}
.decision-banner.tie{background:var(--amber-tint);border-color:#f0dfb8}
.decision-banner .dbig{font-size:15px;font-weight:600;color:var(--ink)}
.decision-banner .dsmall{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.db-ico{width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.db-ico svg{width:22px;height:22px;color:var(--green)}
.decision-banner.tie .db-ico svg{color:var(--amber)}

/* Voter table */
.vtable{width:100%;border-collapse:collapse;margin-top:6px}
.vtable th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
.vtable td{padding:12px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:top}
.vtable tr:last-child td{border-bottom:none}
.mini-avatar{width:28px;height:28px;border-radius:50%;background:var(--lav-tint);color:var(--lav);display:inline-flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;margin-right:8px}
.tag{display:inline-block;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px;white-space:nowrap}
.tag-1{background:var(--lav-tint);color:var(--lav)}
.tag-2{background:#e4f0fb;color:#3d7fc0}
.tag-3{background:var(--green-tint);color:#2a9d63}
.tag-none{background:#f2f0f7;color:var(--ink-faint)}

.section-lbl{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600;margin:24px 0 12px}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:.28s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* signers list on member page */
.who-signed{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.sig-dot{display:inline-flex;align-items:center;gap:5px;background:var(--lav-tint2);border:1px solid var(--line);padding:4px 9px;border-radius:20px;font-size:11.5px;color:var(--ink-soft)}
.sig-dot.done{background:var(--green-tint);border-color:#bfe9d3;color:#2a9d63}
.sig-dot .d{width:6px;height:6px;border-radius:50%;background:var(--line)}
.sig-dot.done .d{background:var(--green)}

@media(max-width:560px){
  .main{padding:20px 16px 60px}
  .tb-user .who{display:none}
  .page-head h2{font-size:20px}
}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <h1>Комиссия по предварительной экспертизе</h1>
    <p class="sub">проектов научных статей и иных материалов, содержащих результаты генетических исследований · ООО «Эвоген»</p>

    <div class="field">
      <label>Логин</label>
      <input id="inLogin" type="text" placeholder="например, expert1" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input id="inPass" type="password" placeholder="Пароль" autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()">Войти в систему</button>
    <div class="login-err" id="loginErr"></div>

    <div class="demo-hint">
      <b>Учётные записи (демо)</b>
      <div class="demo-chips" id="demoChips"></div>
      <div style="margin-top:8px">Пароль у всех: <b>evogen</b> · нажмите на карточку для автозаполнения</div>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div class="app" id="appView">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="tb-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="tb-title">Предварительная экспертиза<small>ООО «Эвоген» · генетические исследования</small></div>
      <div class="tb-spacer"></div>
      <div class="tb-user">
        <div class="who"><div class="name" id="tbName"></div><div class="role" id="tbRole"></div></div>
        <div class="avatar" id="tbAvatar"></div>
        <button class="x" title="Выйти" onclick="logout()">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="tabs" id="tabs"></div>
    <div id="pageMaterials"></div>
    <div id="pageUpload" class="hidden"></div>
    <div id="pageResults" class="hidden"></div>
    <div id="pageSummary" class="hidden"></div>
  </div>
</div>

<div id="modalRoot"></div>

/* Открыть исходный .docx (для загруженных материалов) */
function openDocx(id){
  const m=MATERIALS.find(x=>x.id===id); if(!m.docx){ toast('Исходный файл недоступен'); return; }
  const bin=atob(m.docx.b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=m.docx.name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* Скачать материал как PDF с водяным знаком «Материал ООО «Эвоген»» */
let _pdfFontsReady=false;
function ensurePdfFonts(doc){
  doc.addFileToVFS('DejaVu.ttf', window.DEJAVU_REGULAR);
  doc.addFont('DejaVu.ttf','DejaVu','normal');
  doc.addFileToVFS('DejaVuB.ttf', window.DEJAVU_BOLD);
  doc.addFont('DejaVuB.ttf','DejaVu','bold');
}
function htmlToBlocks(html){
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  const blocks=[];
  tmp.querySelectorAll('h1,h2,h3,p,li').forEach(el=>{
    const t=el.textContent.trim(); if(!t) return;
    const tag=el.tagName.toLowerCase();
    blocks.push({ type:(tag==='h1'||tag==='h2'||tag==='h3')?'h':(tag==='li'?'li':'p'), level:tag, text:(tag==='li'?'•  ':'')+t });
  });
  return blocks;
}
function downloadPdf(id){
  const m=MATERIALS.find(x=>x.id===id);
  if(!window.jspdf){ toast('Библиотека PDF ещё загружается, повторите'); return; }
  const { jsPDF }=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  ensurePdfFonts(doc);
  const pageW=doc.internal.pageSize.getWidth(), pageH=doc.internal.pageSize.getHeight();
  const marginX=56, marginTop=64, marginBottom=64, maxW=pageW-marginX*2;
  let y=marginTop;

  const watermark=()=>{
    if(doc.saveGraphicsState){ doc.saveGraphicsState(); doc.setGState(new doc.GState({opacity:0.10})); }
    doc.setFont('DejaVu','bold'); doc.setFontSize(38); doc.setTextColor(124,108,240);
    doc.text('Материал ООО «Эвоген»', pageW/2, pageH/2, {align:'center', angle:33});
    if(doc.restoreGraphicsState) doc.restoreGraphicsState();
    doc.setTextColor(20,20,30);
  };
  const footer=()=>{
    doc.setFont('DejaVu','normal'); doc.setFontSize(8); doc.setTextColor(150,150,165);
    doc.text('Комиссия по предварительной экспертизе · ООО «Эвоген» · '+today(), marginX, pageH-28);
    doc.setTextColor(20,20,30);
  };
  const newPage=()=>{ footer(); doc.addPage(); watermark(); y=marginTop; };

  watermark();
  // шапка
  doc.setFont('DejaVu','normal'); doc.setFontSize(9); doc.setTextColor(120,120,135);
  doc.text('ООО «Эвоген» · материал на предварительной экспертизе', marginX, y); y+=22;
  doc.setTextColor(20,20,30);

  const blocks=htmlToBlocks(m.text);
  blocks.forEach(b=>{
    let size, bold, gap;
    if(b.type==='h'){ size=b.level==='h1'?16:13; bold=true; gap=10; y+=6; }
    else { size=11; bold=false; gap=6; }
    doc.setFont('DejaVu', bold?'bold':'normal'); doc.setFontSize(size);
    const lines=doc.splitTextToSize(b.text, maxW);
    lines.forEach(ln=>{
      if(y>pageH-marginBottom){ newPage(); }
      doc.text(ln, marginX, y); y+=size*1.4;
    });
    y+=gap;
  });
  footer();
  const safe=m.title.replace(/[^а-яА-Яa-zA-Z0-9]+/g,'_').slice(0,40);
  doc.save('Материал_'+safe+'.pdf');
  toast('PDF с водяным знаком скачан ✓');
}

let pendingText='';
let pendingDocx=null; // {name, b64}
function wireDrop(){
  const drop=document.getElementById('drop'), fi=document.getElementById('fileInput');
  drop.onclick=()=>fi.click();
  drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
  drop.ondragleave=()=>drop.classList.remove('over');
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);};
  fi.onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
}
function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.docx')){ toast('Поддерживаются только файлы .docx'); return; }
  document.getElementById('dropTitle').textContent=file.name;
  document.getElementById('dropSub').textContent='Файл загружен · извлекаем текст…';
  const reader=new FileReader();
  reader.onload=ev=>{
    const buf=ev.target.result;
    // сохранить исходный .docx (base64) для открытия в Word
    let bin=''; const bytes=new Uint8Array(buf);
    for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    pendingDocx={ name:file.name, b64:btoa(bin) };
    mammoth.convertToHtml({arrayBuffer:buf}).then(r=>{
      pendingText=r.value||'<p>(пустой документ)</p>';
      document.getElementById('mPreview').innerHTML=pendingText;
      document.getElementById('uploadMeta').classList.remove('hidden');

      document.getElementById('dropSub').textContent='Готово · проверьте данные ниже';
    }).catch(()=>{toast('Не удалось прочитать файл');});
  };
  reader.readAsArrayBuffer(file);
}

/* ============================================================

   ============================================================ */
function tally(m){
  const c={1:0,2:0,3:0};
  Object.values(m.ballots).forEach(b=>c[b.option]++);
  return c;
}
function winnerOf(m){
  const c=tally(m); let max=-1,wins=[];
  [1,2,3].forEach(k=>{ if(c[k]>max){max=c[k];wins=[k];} else if(c[k]===max)wins.push(k); });
  if(max===0) return {decided:false,tie:false,option:null};
  return { decided:true, tie:wins.length>1, option:wins[0], wins };
}

/* ============================================================
   ВЫГРУЗКА ПРОТОКОЛА (.doc, открывается Word)
   ============================================================ */
function exportProtocol(id){
  const m=MATERIALS.find(x=>x.id===id);
  const c=tally(m), n=ballotCount(m), w=winnerOf(m);
  const chair=USERS.find(u=>u.role==='chair'), sec=USERS.find(u=>u.role==='secretary');

  const voteRows=EXPERTS.map((e,i)=>{
    const b=m.ballots[e.login];
    const txt=b?('Вариант '+b.option+' — '+optById(b.option).main):'не голосовал';
    return `<tr><td>${i+1}</td><td>${e.name}</td><td>${txt}</td><td>${b&&b.comment?b.comment:'—'}</td></tr>`;
  }).join('');

  let decision;
  if(n===0) decision='голосование не проводилось';
  else if(w.tie) decision='различное мнение членов комиссии, единое большинство не сложилось, решение не принято';
  else decision=optById(w.option).main+' (принято большинством голосов: '+c[w.option]+' из '+n+')';

  const html=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><title>Протокол</title>
  <style>
   body{font-family:'Times New Roman',serif;font-size:14px;margin:2cm}
   h1{font-size:16px;text-align:center;text-transform:uppercase}
   .center{text-align:center}
   table{border-collapse:collapse;width:100%;margin:12px 0}
   td,th{border:1px solid #000;padding:6px 8px;font-size:13px;vertical-align:top}
   th{background:#eee}
   .sig{margin-top:40px}
   .row{display:flex;justify-content:space-between;margin-top:26px}
  </style></head><body>
  <p class="center">ООО «Эвоген»<br>Комиссия по предварительной экспертизе проектов научных статей,<br>иных материалов, содержащих результаты генетических исследований</p>
  <h1>Протокол заседания комиссии</h1>
  <p class="center">г. Москва &nbsp;&nbsp;&nbsp; «${today()}»</p>
  <p><b>Предмет экспертизы:</b> ${m.title}<br>

     <b>Материал загружен:</b> ${m.uploadedBy}, ${m.date}</p>
  <p><b>Присутствовали:</b> председатель ${chair.name}, секретарь ${sec.name}, члены комиссии — ${EXPERTS.map(e=>e.name).join(', ')}.</p>
  <p><b>Проголосовало членов комиссии:</b> ${n} из ${EXPERTS.length}.</p>
  <p><b>Результаты голосования:</b></p>
  <table>
    <tr><th>Вариант</th><th>Формулировка</th><th>Голосов</th></tr>
    <tr><td>1</td><td>${OPTIONS[0].main}</td><td class="center">${c[1]}</td></tr>
    <tr><td>2</td><td>${OPTIONS[1].main}</td><td class="center">${c[2]}</td></tr>
    <tr><td>3</td><td>${OPTIONS[2].main}</td><td class="center">${c[3]}</td></tr>
  </table>
  <p><b>Бюллетени членов комиссии:</b></p>
  <table>
    <tr><th>№</th><th>Член комиссии</th><th>Результат экспертизы</th><th>Рекомендации по доработке</th></tr>
    ${voteRows}
  </table>
  <p><b>РЕШИЛИ:</b> ${decision}.</p>
  <div class="row">
    <div>Председатель комиссии &nbsp; _______________ / ${chair.name} /</div>
  </div>
  <div class="row">
    <div>Секретарь комиссии &nbsp; _______________ / ${sec.name} /</div>
  </div>
  </body></html>`;

  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='Протокол_'+m.title.replace(/[^а-яА-Яa-zA-Z0-9]+/g,'_').slice(0,40)+'.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);

}

/* ============================================================
   СВОДНЫЙ ОТЧЁТ ПО ВСЕМ МАТЕРИАЛАМ
   ============================================================ */
function decisionText(m){
  const n=ballotCount(m), w=winnerOf(m), c=tally(m);
  if(n===0) return {short:'Не голосовали', full:'голосование не проводилось', cls:'tag-none'};
  if(w.tie){
    const names=w.wins.map(k=>'вар. '+k).join(' / ');
    return {short:'Различное мнение', full:'различное мнение членов комиссии ('+names+'), единое большинство не сложилось, решение не принято', cls:'tag-none'};
  }
  const o=optById(w.option);
  return {short:'Вариант '+w.option, full:o.main+' (большинством: '+c[w.option]+' из '+n+')', cls:o.tag};
}
function renderSummary(){
  const el=document.getElementById('pageSummary');
  let head=`<div class="page-head"><div><h2>Сводный отчёт комиссии</h2>
    <div class="lead">Единая ведомость по всем материалам на экспертизе: явка, распределение голосов, итоговое решение и сроки.</div></div>
    <button class="btn slim" onclick="exportSummary()">Выгрузить сводный отчёт</button></div>`;

  if(MATERIALS.length===0){ el.innerHTML=head+emptyBlock('Нет материалов','Сводный отчёт появится после загрузки материалов.'); return; }

  // агрегаты
  let done=0,partial=0,open=0,overdue=0;
  MATERIALS.forEach(m=>{ const st=statusOf(m); if(st==='done')done++;else if(st==='partial')partial++;else open++;
    if(daysLeft(m.deadline)!==null && daysLeft(m.deadline)<0 && st!=='done') overdue++; });

  const stat=`<div class="tally-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="tally-card"><div class="tnum">${MATERIALS.length}</div><div class="tlbl">всего материалов</div></div>
    <div class="tally-card win"><div class="tnum">${done}</div><div class="tlbl">экспертиза завершена</div></div>
    <div class="tally-card"><div class="tnum">${partial+open}</div><div class="tlbl">в работе / ожидают</div></div>
    <div class="tally-card"><div class="tnum" style="color:${overdue?'var(--red)':'var(--lav)'}">${overdue}</div><div class="tlbl">просрочено</div></div>
  </div>`;

  const rows=MATERIALS.map((m,i)=>{
    const c=tally(m), n=ballotCount(m), d=decisionText(m);
    const dl=daysLeft(m.deadline);
    const dlCell = m.deadline
      ? (statusOf(m)==='done' ? `<span style="color:var(--ink-faint)">${m.deadline}</span>`
        : dl<0 ? `<span style="color:var(--red);font-weight:600">${m.deadline} (просрочен)</span>`
        : dl<=3 ? `<span style="color:var(--amber);font-weight:600">${m.deadline} (${dl} дн.)</span>`
        : `${m.deadline}`)
      : '—';
    return `<tr>
      <td style="color:var(--ink-faint)">${i+1}</td>
      <td><div style="font-weight:600;font-size:13.5px">${m.title}</div><div style="color:var(--ink-faint);font-size:12px;margin-top:2px">${m.author}</div></td>
      <td style="white-space:nowrap">${n} / ${EXPERTS.length}</td>
      <td style="white-space:nowrap;color:var(--ink-soft)">${c[1]} · ${c[2]} · ${c[3]}</td>
      <td><span class="tag ${d.cls}">${d.short}</span></td>
      <td style="white-space:nowrap;font-size:13px">${dlCell}</td>
    </tr>`;
  }).join('');

  el.innerHTML=head+stat+`<div class="card">
    <table class="vtable">
      <thead><tr><th>№</th><th>Материал</th><th>Явка</th><th>Голоса (В1·В2·В3)</th><th>Решение</th><th>Срок</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:11.5px;color:var(--ink-faint);margin-top:12px;line-height:1.6">
      В1 — направление в Межведомственную комиссию для получения разрешения · В2 — в порядке уведомления · В3 — рекомендовано к публикации
    </div>
  </div>`;
}
function exportSummary(){
  const chair=USERS.find(u=>u.role==='chair'), sec=USERS.find(u=>u.role==='secretary');
  const rows=MATERIALS.map((m,i)=>{
    const c=tally(m), n=ballotCount(m), d=decisionText(m);
    return `<tr><td>${i+1}</td><td>${m.title}<br><i>${m.author}</i></td><td class="center">${n}/${EXPERTS.length}</td>
      <td class="center">${c[1]}</td><td class="center">${c[2]}</td><td class="center">${c[3]}</td>
      <td>${d.full}</td><td class="center">${m.deadline||'—'}</td></tr>`;
  }).join('');
  const html=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset='utf-8'><title>Сводный отчёт</title><style>
   body{font-family:'Times New Roman',serif;font-size:13px;margin:2cm}
   h1{font-size:16px;text-align:center;text-transform:uppercase}
   .center{text-align:center}
   table{border-collapse:collapse;width:100%;margin:12px 0}
   td,th{border:1px solid #000;padding:5px 7px;font-size:12px;vertical-align:top}
   th{background:#eee}
   .row{margin-top:30px}
  </style></head><body>
  <p class="center">ООО «Эвоген»<br>Комиссия по предварительной экспертизе проектов научных статей,<br>иных материалов, содержащих результаты генетических исследований</p>
  <h1>Сводный отчёт по результатам экспертизы</h1>
  <p class="center">по состоянию на ${today()}</p>
  <table>
    <tr><th>№</th><th>Материал / автор</th><th>Явка</th><th>В1</th><th>В2</th><th>В3</th><th>Решение комиссии</th><th>Срок</th></tr>
    ${rows}
  </table>
  <p style="font-size:11px"><b>Обозначения:</b> В1 — направить в Межведомственную комиссию для получения разрешения; В2 — направить в Межведомственную комиссию в порядке уведомления; В3 — рекомендовать для публикации.</p>
  <div class="row">Председатель комиссии &nbsp; _______________ / ${chair.name} /</div>
  <div class="row">Секретарь комиссии &nbsp; _______________ / ${sec.name} /</div>
  </body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='Сводный_отчёт_экспертизы_'+today().replace(/\./g,'_')+'.doc';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Сводный отчёт выгружен ✓');
}

/* ============================================================
   УТИЛИТЫ
   ============================================================ */
function today(){ const d=new Date(); return fmtDate(d); }
function fmtDate(d){ return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear(); }
function plusDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return fmtDate(d); }
function parseDate(s){ const [dd,mm,yy]=s.split('.').map(Number); return new Date(yy,mm-1,dd); }
function daysLeft(deadline){ if(!deadline) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((parseDate(deadline)-t)/86400000); }
function deadlineBadge(deadline){
  const dl=daysLeft(deadline); if(dl===null) return '';
  if(dl<0) return `<span class="status-pill st-open">Просрочен · ${deadline}</span>`;
  if(dl===0) return `<span class="status-pill st-open">Сегодня · ${deadline}</span>`;
  if(dl<=3) return `<span class="status-pill st-wait">Ещё ${dl} дн. · до ${deadline}</span>`;
  return `<span class="status-pill st-wait">до ${deadline}</span>`;
}
function openModal(html){ document.getElementById('modalRoot').innerHTML=`<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }

renderChips();
